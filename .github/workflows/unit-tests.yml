name: unit-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm to match packageManager field
        run: npm install --global npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: Run package unit tests
        run: npm run test -w ./packages --if-present

      - name: Run deploy-web unit tests
        run: npm run test:unit -w apps/deploy-web
